<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozinha Baron</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c45e3c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cozinha Baron" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terra:   #c45e3c;
      --terra-d: #9e3f22;
      --cream:   #f5ede3;
      --warm:    #f0dcc8;
      --brown:   #4a2c1a;
      --muted:   #a07858;
      --gold:    #d4945a;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--brown);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Background blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: 0;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--terra); top: -120px; right: -80px; }
    .blob-2 { width: 340px; height: 340px; background: var(--gold);  bottom: -100px; left: -80px; animation-delay: -4s; }
    .blob-3 { width: 200px; height: 200px; background: var(--warm);  top: 55%; left: 50%; transform: translate(-50%,-50%); animation-delay: -2s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(18px, 14px) scale(1.06); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      gap: 0;
    }

    /* ── Decorative ring ── */
    .ring-wrap {
      position: relative;
      margin-bottom: 2.2rem;
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .ring {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 2.5px dashed var(--terra);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 90s linear infinite;
    }
    .ring-inner {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terra) 0%, var(--terra-d) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(196,94,60,0.45), 0 2px 8px rgba(0,0,0,0.15);
    }
    .ring-inner svg {
      width: 58px;
      height: 58px;
      fill: var(--cream);
      opacity: 0.95;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Divider leaves ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.1rem 0 1.4rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s ease forwards;
    }
    .divider span { width: 52px; height: 1px; background: var(--muted); opacity: 0.5; }
    .divider svg  { width: 20px; height: 20px; fill: var(--terra); }

    /* ── Typography ── */
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--terra);
      opacity: 0;
      animation: fadeUp 0.6s 0.3s ease forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 12vw, 4.8rem);
      font-weight: 600;
      line-height: 1;
      text-align: center;
      color: var(--brown);
      opacity: 0;
      animation: fadeUp 0.7s 0.45s ease forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--terra);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.50rem;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 0.7s 0.75s ease forwards;
    }

    /* ── CTA Button ── */
    .cta-wrap {
      margin-top: 2.6rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.9s ease forwards;
    }

.cta {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1.8rem;
  background: transparent;
  color: var(--terra);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-decoration: none;
  border-radius: 100px;
  border: 1.5px solid var(--terra);
  box-shadow: none;
  transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
  cursor: pointer;
}
.cta:hover  { transform: translateY(-2px); background: transparent; color: var(--terra); }
.cta:active { transform: translateY(0); }
.cta svg    { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── Footer dots ── */
    .dots {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.6s 1.1s ease forwards;
    }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--terra);
      opacity: 0.3;
    }
    .dots span:nth-child(2) { opacity: 0.6; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* corner decorations */
    .corner {
      position: fixed;
      width: 90px;
      height: 90px;
      z-index: 1;
      opacity: 0.18;
    }
    .corner svg { width: 100%; height: 100%; fill: var(--terra); }
    .corner-tl { top: 12px; left: 12px; }
    .corner-br { bottom: 12px; right: 12px; transform: rotate(180deg); }
  </style>
</head>
<body>

<!-- blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- corner ornaments -->
<div class="corner corner-tl">
  <svg viewBox="0 0 100 100"><path d="M10 10 Q10 50 50 50 Q10 50 10 90" stroke-width="3" stroke="currentColor" fill="none" stroke-linecap="round"/><circle cx="10" cy="10" r="5"/><circle cx="50" cy="50" r="4"/><circle cx="10" cy="90" r="5"/></svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 100 100"><path d="M10 10 Q10 50 50 50 Q10 50 10 90" stroke-width="3" stroke="currentColor" fill="none" stroke-linecap="round"/><circle cx="10" cy="10" r="5"/><circle cx="50" cy="50" r="4"/><circle cx="10" cy="90" r="5"/></svg>
</div>

<!-- card -->
<div class="card">
   <div class="ring-wrap">
    <div class="ring">
    <div class="ring-inner">
  <img src="logo.png" alt="Cozinha Baron" style="width:100px;height:100px;border-radius:50%;object-fit:cover;" />
</div>
    </div>
  </div>

<img src="feitonaminhacozinha.png" alt="Cozinha Baron" style="max-width:280px;width:100%;opacity:0;animation:fadeUp 0.7s 0.45s ease forwards;" />

  <div class="divider">
    <span></span>
    <svg viewBox="0 0 24 24"><path d="M12 2C9 6 5 8 5 12a7 7 0 0 0 14 0c0-4-4-6-7-10zM12 20a5 5 0 0 1-5-5c0-2.8 2.5-4.8 5-8 2.5 3.2 5 5.2 5 8a5 5 0 0 1-5 5z"/></svg>
    <span></span>
  </div>

  <p class="tagline">Receitas caseiras com sabor</p>

  <div class="cta-wrap">
    <a class="cta" href="https://cozinhabaron.blogspot.com/search/label/Jantar%20a%20dois" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M11 17H7a5 5 0 0 1 0-10h4v2H7a3 3 0 0 0 0 6h4v2zm2 0v-2h4a3 3 0 0 0 0-6h-4V7h4a5 5 0 0 1 0 10h-4zm-3-4v-2h4v2H10z"/></svg>
      Ver as Receitas
    </a>
  </div>
</div>

<div class="dots">
  <span></span><span></span><span></span>
</div>

<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
  });

// Pull-to-refresh
(function () {
  let startY = 0, pulling = false, indicator;

  function createIndicator() {
    indicator = document.createElement('div');
    indicator.style.cssText = `
      position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(-60px);
      background: var(--terra); color: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.08em;
      padding: 8px 20px; border-radius: 0 0 20px 20px;
      z-index: 9999; transition: transform 0.25s ease; pointer-events: none;
    `;
    indicator.textContent = '↓ Puxe para atualizar';
    document.body.appendChild(indicator);
  }

  function showIndicator(show) {
    indicator.style.transform = `translateX(-50%) translateY(${show ? '0px' : '-60px'})`;
    indicator.textContent = show === 'ready' ? '↑ Solte para atualizar' : '↓ Puxe para atualizar';
  }

  createIndicator();

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const delta = e.touches[0].clientY - startY;
    if (delta > 10) showIndicator(delta > 70 ? 'ready' : true);
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const delta = e.changedTouches[0].clientY - startY;
    if (delta > 70) {
      indicator.textContent = '✓ Atualizando…';
      setTimeout(() => window.location.reload(true), 400);
    } else {
      showIndicator(false);
    }
  });
})();

</script>
</body>
</html>
